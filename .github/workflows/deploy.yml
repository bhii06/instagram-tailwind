name: Deploy Instagram Mockup to Pages

on:
  push:
    branches: ["main"] # Sesuaikan dengan nama branch utama Anda (misal: main atau master)

  # Mengizinkan penayangan manual dari tab Actions
  workflow_dispatch:

# Mengatur izin GITHUB_TOKEN untuk mengizinkan deployment ke GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Mengizinkan satu deployment bersamaan
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps: deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Vite secara bawaan mengeluarkan hasil kompilasi ke folder dist
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4